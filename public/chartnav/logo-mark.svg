<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="ChartNav">
  <title>ChartNav</title>

  <!-- Circuit traces around the cross -->
  <g stroke="#C9A227" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M4 15h6"/>
    <path d="M4 22h5"/>
    <path d="M38 15h6"/>
    <path d="M39 22h5"/>
    <path d="M6 33h7"/>
    <path d="M35 33h7"/>
    <path d="M15 43v3"/>
    <path d="M33 43v3"/>
  </g>
  <g fill="#C9A227">
    <circle cx="3" cy="15" r="0.9"/>
    <circle cx="3" cy="22" r="0.9"/>
    <circle cx="45" cy="15" r="0.9"/>
    <circle cx="45" cy="22" r="0.9"/>
    <circle cx="5" cy="33" r="0.9"/>
    <circle cx="43" cy="33" r="0.9"/>
    <circle cx="15" cy="47" r="0.9"/>
    <circle cx="33" cy="47" r="0.9"/>
  </g>

  <!-- Gold cross -->
  <g fill="#D8B547">
    <rect x="19" y="11" width="10" height="30" rx="0.8"/>
    <rect x="9"  y="19" width="30" height="10" rx="0.8"/>
  </g>

  <!-- Wings above the cross -->
  <g fill="#E8CE7A">
    <path d="M24 8.5
             C 19 4.5, 12 5.5, 11 9.5
             C 15 7.8, 20 8.8, 24 10.2 Z"/>
    <path d="M24 8.5
             C 29 4.5, 36 5.5, 37 9.5
             C 33 7.8, 28 8.8, 24 10.2 Z"/>
    <circle cx="24" cy="8.5" r="1.3"/>
  </g>

  <!-- Red caduceus: staff + twin serpent coils -->
  <g stroke="#C0392B" stroke-width="1.3" stroke-linecap="round" fill="none">
    <line x1="24" y1="13" x2="24" y2="39"/>
    <path d="M22 18 Q26 21 22 24 Q18 27 22 30 Q26 33 22 36"/>
    <path d="M26 18 Q22 21 26 24 Q30 27 26 30 Q22 33 26 36"/>
    <!-- tiny pommel at top of staff -->
    <circle cx="24" cy="14" r="0.9" fill="#C0392B"/>
  </g>
</svg>
