    <rect x="10" y="52" width="24" height="14" rx="2" fill="#0B6E79"/>
    <rect x="62" y="52" width="24" height="14" rx="2" fill="#0B6E79"/>
    <rect x="40" y="20" width="12" height="78" rx="4" fill="#DC2626"/>
