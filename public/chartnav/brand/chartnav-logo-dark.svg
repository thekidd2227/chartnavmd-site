<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="ChartNav">
  <title>ChartNav</title>
  <!-- Pulse mark (teal stays teal, red stays red — only wordmark flips) -->
  <g>
    <rect x="10" y="52" width="24" height="14" rx="2" fill="#14B8A6"/>
    <rect x="62" y="52" width="24" height="14" rx="2" fill="#14B8A6"/>
    <rect x="40" y="20" width="12" height="78" rx="4" fill="#EF4444"/>
  </g>
  <!-- Wordmark — white "Chart" + teal "Nav" for dark backgrounds -->
  <g font-family="Inter, -apple-system, 'SF Pro Display', system-ui, sans-serif"
     font-size="80" font-weight="700" letter-spacing="-0.02em">
    <text x="120" y="82" fill="#FAFAF7">Chart</text>
    <text x="320" y="82" fill="#14B8A6">Nav</text>
  </g>
</svg>
