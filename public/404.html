<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ARCG Systems</title>
<script>
// chartnav.ai safety-net redirect (phase 17) — runs before SPA redirect.
(function(loc){
  var h = loc.hostname.toLowerCase();
  if (h === 'chartnav.ai' || h === 'www.chartnav.ai') {
    var rest = loc.pathname === '/' || loc.pathname === '' ? '' : loc.pathname;
    loc.replace('https://arcgsystems.com/chartnav' + (rest || '/') + loc.search + loc.hash);
    return;
  }
})(window.location);

// GitHub Pages SPA redirect — preserves the path for client-side routing
var pathSegmentsToKeep = 0;
var l = window.location;
l.replace(
  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
  l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
  l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
  (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
  l.hash
);
</script>
</head>
<body>
</body>
</html>
